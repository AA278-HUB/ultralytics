# Parameters
nc: 80  # number of classes

scales:
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

# YOLO11 backbone
backbone:
  # [from, repeats, module, args]
  - [-1, 1, GhostConv, [64, 3, 2]]                 # 0  P1/2 (stride 2)
  - [-1, 1, GhostConv, [128, 3, 2]]                # 1  P2/4 (stride 4)

  - [-1, 1, ShuffleV2Block, [256, 3, 2]]           # 2  P3/8 (stride 8)
  - [-1, 1, CoordAtt, [8]]                         # 3  CA on P3

  - [-1, 1, ShuffleV2Block, [512, 3, 2]]           # 4  P4/16 (stride 16)
  - [-1, 1, CoordAtt, [8]]                         # 5  CA on P4

  - [-1, 1, ShuffleV2Block, [1024, 3, 2]]          # 6  P5/32 (stride 32)
  - [-1, 1, CoordAtt, [8]]                         # 7  CA on P5

  - [-1, 1, ShuffleV2Block, [1024, 3, 1]]          # 8
  - [-1, 1, SPPF, [1024, 5]]                       # 9
  - [-1, 2, C2PSA, [1024]]                         # 10 final high-level PSA

# YOLO11 head (修正后的 BiFPN 逻辑)
head:
  # ---------- Top-down pathway ----------
  # P5 (1024) -> P4
  - [-1, 1, GhostConv, [512, 1, 1]]                          # 11: 降维 1024 -> 512
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]          # 12
  - [[-1, 5], 1, BiFPN_Sum2, [1]]                       # 13: P5_upsampled(512) + P4(512) √
  - [-1, 2, C3RepGhost, [512, False, 1, 0.25]]          # 14 (P4_td)

  # P4_td (512) -> P3
  - [-1, 1, GhostConv, [256, 1, 1]]                          # 15: 降维 512 -> 256
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]          # 16
  - [[-1, 3], 1, BiFPN_Sum2, [1]]                       # 17: P4_upsampled(256) + P3(256) √
  - [-1, 2, C3RepGhost, [256, False, 1, 0.25]]          # 18 (P3_out)

  # ---------- Bottom-up pathway ----------
  # P3_out (256) -> P4_out
  - [-1, 1, GhostConv, [512, 3, 2]]                     # 19: 升维并下采样 256 -> 512
  - [[-1, 5, 14], 1, BiFPN_Sum3, [1]]                   # 20: P3_down(512) + P4_raw(512) + P4_td(512) √
  - [-1, 2, C3RepGhost, [512, False, 1, 0.25]]          # 21 (P4_out)

  # P4_out (512) -> P5_out
  - [-1, 1, GhostConv, [1024, 3, 2]]                    # 22: 升维并下采样 512 -> 1024
  - [[-1, 10], 1, BiFPN_Sum2, [1]]                      # 23: P4_down(1024) + P5_raw(1024) √
  - [-1, 2, C3RepGhost, [1024, True, 1, 0.25]]          # 24 (P5_out)

  - [[18, 21, 24], 1, Detect, [nc]]                     # 25 Detect
