# Parameters
nc: 80  # number of classes

scales:
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]

# YOLO11 backbone
backbone:
  # [from, repeats, module, args]
  - [-1, 1, GhostConv, [64, 3, 2]]                 # 0  P1/2 (stride 2)
  - [-1, 1, GhostConv, [128, 3, 2]]                # 1  P2/4 (stride 4)

  - [-1, 1, ShuffleV2Block, [256, 3, 2]]           # 2  P3/8 (stride 8)
  - [-1, 1, CoordAtt, [8]]                         # 3  CA on P3

  - [-1, 1, ShuffleV2Block, [512, 3, 2]]           # 4  P4/16 (stride 16)
  - [-1, 1, CoordAtt, [8]]                         # 5  CA on P4

  - [-1, 1, ShuffleV2Block, [1024, 3, 2]]          # 6  P5/32 (stride 32)
  - [-1, 1, CoordAtt, [8]]                         # 7  CA on P5

  - [-1, 1, ShuffleV2Block, [1024, 3, 1]]          # 8
  - [-1, 1, SPPF, [1024, 5]]                       # 9
  - [-1, 2, C2PSA, [1024]]                         # 10 final high-level PSA

head:
  # 1. 预对齐：按比例分配通道 (Base: 256)
  - [3, 1, GhostConv, [256, 1, 1]]           # 11: P3_in (256)
  - [5, 1, GhostConv, [512, 1, 1]]           # 12: P4_in (512)
  - [10, 1, GhostConv, [1024, 1, 1]]         # 13: P5_in (1024)

  # 2. Top-down Pathway (从大通道往小通道走，需要降维)
  # P5(1024) -> P4
  - [13, 1, nn.Upsample, [None, 2, "nearest"]] # 14: 1024
  - [-1, 1, GhostConv, [512, 1, 1]]            # 15: 降维到 512 以匹配 P4
  - [[-1, 12], 1, BiFPN_Sum2, [1]]             # 16: 512 + 512
  - [-1, 2, C3RepGhost, [512, False]]          # 17: P4_td (512)

  # P4_td(512) -> P3
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]] # 18: 512
  - [-1, 1, GhostConv, [256, 1, 1]]            # 19: 降维到 256 以匹配 P3
  - [[-1, 11], 1, BiFPN_Sum2, [1]]             # 20: 256 + 256
  - [-1, 2, C3RepGhost, [256, False]]          # 21: P3_out (256) -> Head 1

  # 3. Bottom-up Pathway (从小通道往大通道走，需要升维)
  # P3_out(256) -> P4
  - [-1, 1, GhostConv, [512, 3, 2]]            # 22: 下采样并升维 256->512
  - [[-1, 12, 17], 1, BiFPN_Sum3, [1]]         # 23: P3_down(512) + P4_in(512) + P4_td(512)
  - [-1, 2, C3RepGhost, [512, False]]          # 24: P4_out (512) -> Head 2

  # P4_out(512) -> P5
  - [-1, 1, GhostConv, [1024, 3, 2]]           # 25: 下采样并升维 512->1024
  - [[-1, 13], 1, BiFPN_Sum2, [1]]             # 26: P4_down(1024) + P5_in(1024)
  - [-1, 2, C3RepGhost, [1024, True]]          # 27: P5_out (1024) -> Head 3

  - [[21, 24, 27], 1, Detect, [nc]]            # 28